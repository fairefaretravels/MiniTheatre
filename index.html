<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyGirls OS</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a10;
    color: white;
  }

  /* LOGIN SCREEN */
  .lockscreen {
    position: fixed;
    inset: 0;
    background: #0a0a10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  input {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
    width: 200px;
    text-align: center;
  }

  button {
    margin-top: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #2a2a3d;
    color: white;
    cursor: pointer;
  }

  /* HOME GRID */
  .home {
    display: none;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .app {
    background: #1a1a25;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
  }

  /* PLAYER */
  .player {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  video {
    width: 100%;
    flex: 1;
    background: black;
  }

  .bar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #111;
  }

  /* TIMER BAR */
  .timer {
    text-align: center;
    padding: 6px;
    font-size: 12px;
    background: #0f0f16;
  }
</style>
</head>

<body>

<!-- 🔐 LOCK SCREEN -->
<div class="lockscreen" id="lockscreen">
  <h2>🔒 Parent Unlock</h2>
  <input type="password" id="pin" placeholder="Enter PIN"/>
  <button onclick="unlock()">Enter</button>
</div>

<!-- 🏠 HOME -->
<div class="home" id="home"></div>

<!-- 🎬 PLAYER -->
<div class="player" id="playerView">
  <div class="timer" id="timer">Session: 0:00</div>

  <video id="video" controls autoplay playsinline></video>

  <div class="bar">
    <button onclick="backHome()">⬅ Home</button>
    <button onclick="next()">Next ➜</button>
  </div>
</div>

<script>
/* --------------------------
   CONTROLLED CONTENT LIBRARY
---------------------------*/
const library = [
  { title: "Calm Video", src: "https://yourcdn.com/v1.mp4" },
  { title: "Story Time", src: "https://yourcdn.com/v2.mp4" },
  { title: "Learning", src: "https://yourcdn.com/v3.mp4" }
];

/* --------------------------
   PIN CONTROL
---------------------------*/
const PIN = "1234"; // change this

let current = 0;
let sessionStart = null;
let timerInterval;

/* --------------------------
   ELEMENTS
---------------------------*/
const lockscreen = document.getElementById("lockscreen");
const home = document.getElementById("home");
const playerView = document.getElementById("playerView");
const video = document.getElementById("video");
const timer = document.getElementById("timer");

/* --------------------------
   UNLOCK SYSTEM
---------------------------*/
function unlock() {
  const input = document.getElementById("pin").value;

  if (input === PIN) {
    lockscreen.style.display = "none";
    home.style.display = "grid";
    buildHome();
  } else {
    alert("Wrong PIN");
  }
}

/* --------------------------
   HOME UI
---------------------------*/
function buildHome() {
  library.forEach((item, i) => {
    const app = document.createElement("div");
    app.className = "app";
    app.innerText = item.title;
    app.onclick = () => openVideo(i);
    home.appendChild(app);
  });
}

/* --------------------------
   PLAYER
---------------------------*/
function openVideo(i) {
  current = i;
  home.style.display = "none";
  playerView.style.display = "flex";

  video.src = library[i].src;
  video.play();

  startSessionTimer();
}

function next() {
  current = (current + 1) % library.length;
  openVideo(current);
}

function backHome() {
  video.pause();
  playerView.style.display = "none";
  home.style.display = "grid";
  stopTimer();
}

/* --------------------------
   SESSION TIMER (PARENT CONTROL)
---------------------------*/
function startSessionTimer() {
  sessionStart = Date.now();

  timerInterval = setInterval(() => {
    const diff = Math.floor((Date.now() - sessionStart) / 1000);
    const min = Math.floor(diff / 60);
    const sec = diff % 60;
    timer.innerText = `Session: ${min}:${sec.toString().padStart(2,'0')}`;

    /* AUTO STOP AFTER 60 MIN */
    if (diff >= 3600) {
      alert("Session ended");
      backHome();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

/* auto next */
video.addEventListener("ended", next);
</script>

</body>
</html>
