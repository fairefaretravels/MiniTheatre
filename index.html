<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyGirls Media UI</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: white;
  }

  /* HEADER */
  .header {
    padding: 14px;
    text-align: center;
    font-weight: bold;
    background: #12121a;
    letter-spacing: 1px;
  }

  /* GRID HOME */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 12px;
  }

  .card {
    background: #1a1a25;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
  }

  .card:hover {
    transform: scale(1.03);
  }

  .thumb {
    height: 120px;
    background: linear-gradient(45deg, #2c2c44, #111);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    opacity: 0.8;
  }

  .label {
    padding: 10px;
    font-size: 13px;
    text-align: center;
  }

  /* PLAYER VIEW */
  .player-view {
    display: none;
    flex-direction: column;
    height: 100vh;
  }

  video {
    width: 100%;
    flex: 1;
    background: black;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #12121a;
  }

  button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2a2a3d;
    color: white;
    cursor: pointer;
    width: 48%;
  }

  button:hover {
    background: #3a3a55;
  }

  .title {
    text-align: center;
    padding: 8px;
    font-size: 14px;
    background: #0f0f16;
  }

  /* lock scroll globally */
  html, body {
    height: 100%;
    overflow: hidden;
  }
</style>
</head>

<body>

<div class="header">🔒 MYGIRLS SAFE MEDIA</div>

<!-- HOME GRID -->
<div id="home" class="grid"></div>

<!-- PLAYER -->
<div id="playerView" class="player-view">
  <div class="title" id="title">Now Playing</div>

  <video id="video" controls autoplay playsinline></video>

  <div class="controls">
    <button onclick="backHome()">⬅ Library</button>
    <button onclick="nextVideo()">Next ➜</button>
  </div>
</div>

<script>
/* -----------------------
   YOUR CONTROLLED CONTENT
------------------------*/
const playlist = [
  { title: "Video 1", src: "https://yourcdn.com/video1.mp4" },
  { title: "Video 2", src: "https://yourcdn.com/video2.mp4" },
  { title: "Video 3", src: "https://yourcdn.com/video3.mp4" },
  { title: "Video 4", src: "https://yourcdn.com/video4.mp4" }
];

/* -----------------------
   STATE
------------------------*/
let current = 0;

const home = document.getElementById("home");
const playerView = document.getElementById("playerView");
const video = document.getElementById("video");
const title = document.getElementById("title");

/* -----------------------
   BUILD GRID UI
------------------------*/
function buildGrid() {
  playlist.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="thumb">▶</div>
      <div class="label">${item.title}</div>
    `;

    card.onclick = () => openVideo(index);
    home.appendChild(card);
  });
}

/* -----------------------
   OPEN PLAYER
------------------------*/
function openVideo(index) {
  current = index;
  home.style.display = "none";
  playerView.style.display = "flex";

  video.src = playlist[current].src;
  title.textContent = playlist[current].title;

  video.play();
}

/* -----------------------
   BACK TO LIBRARY
------------------------*/
function backHome() {
  video.pause();
  playerView.style.display = "none";
  home.style.display = "grid";
}

/* -----------------------
   NEXT VIDEO
------------------------*/
function nextVideo() {
  current = (current + 1) % playlist.length;
  openVideo(current);
}

/* auto play next */
video.addEventListener("ended", nextVideo);

/* build UI */
buildGrid();

/* optional safety block */
document.addEventListener("contextmenu", e => e.preventDefault());
</script>

</body>
</html>
